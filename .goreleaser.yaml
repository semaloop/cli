# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./cmd/semaloop
    binary: semaloop
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
        -X github.com/semaloop/cli/internal/version.Version={{.Version}}
        -X github.com/semaloop/cli/internal/version.Commit={{.Commit}}
        -X github.com/semaloop/cli/internal/version.Date={{.Date}}
    goos:
      - linux
      - windows
      - darwin

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - name: semaloop
    repository:
      owner: semaloop
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://semaloop.com"
    description: "Command-line interface for Semaloop"
    license: "MIT"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "chore: Bump semaloop to {{ .Tag }}"
    test: |
      system "#{bin}/semaloop", "--version"
